<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Terrakettle{% endblock %}</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --fg: #e6edf3; --muted: #8b949e;
    --clean: #3fb950; --drift: #e8863a; --error: #f85149;
    --timeout: #d29922; --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: .6rem;
    padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.2rem; margin: 0; }
  header a { color: var(--fg); text-decoration: none; }
  main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  a { color: var(--accent); }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    text-align: left; padding: .55rem .7rem;
    border-bottom: 1px solid var(--border);
  }
  th { color: var(--muted); font-weight: 600; font-size: .82rem;
       text-transform: uppercase; letter-spacing: .03em; }
  tr:hover td { background: var(--panel); }
  .badge {
    display: inline-block; padding: .05rem .5rem; border-radius: 999px;
    font-size: .8rem; font-weight: 600; border: 1px solid currentColor;
  }
  .clean { color: var(--clean); }
  .drift { color: var(--drift); }
  .error { color: var(--error); }
  .timeout { color: var(--timeout); }
  .muted { color: var(--muted); }
  .empty { color: var(--muted); padding: 2rem 0; text-align: center; }
  .counts { display: flex; gap: .4rem; flex-wrap: wrap; }
  .btn {
    display: inline-block; padding: .3rem .7rem; border-radius: 6px;
    border: 1px solid var(--border); background: var(--panel);
    color: var(--fg); text-decoration: none; font-size: .85rem; cursor: pointer;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.active { border-color: var(--accent); color: var(--accent); }
  .row { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
  .pager { margin-top: 1rem; }
  input[type=password], input[type=text] {
    padding: .45rem .6rem; border-radius: 6px; border: 1px solid var(--border);
    background: var(--panel); color: var(--fg); font-size: .95rem;
  }
  header a.navlink { color: var(--muted); font-size: .9rem; margin-left: 1rem; }
</style>
</head>
<body>
<header>
  <span style="font-size:1.4rem">🫖</span>
  <h1><a href="/">Terrakettle</a></h1>
  <span style="margin-left:auto">{% block nav %}<span class="muted">Terrahawk report store</span>{% endblock %}</span>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
