{% extends "base.html" %}
{% block title %}Sign in · Terrakettle{% endblock %}
{% block content %}
<div style="max-width:360px;margin:3rem auto;text-align:center">
  <h2>Sign in</h2>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login" class="row" style="justify-content:center;margin-top:1rem">
    <input type="hidden" name="next" value="{{ next }}">
    <input type="password" name="password" placeholder="View password" autofocus>
    <button class="btn" type="submit">Sign in</button>
  </form>
</div>
{% endblock %}
