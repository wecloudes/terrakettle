{% extends "base.html" %}
{% block title %}Sign in · Terrakettle{% endblock %}
{% block content %}
<h2>Sign in</h2>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="/login" class="row">
  <input type="hidden" name="next" value="{{ next }}">
  <input type="password" name="password" placeholder="View password" autofocus>
  <button class="btn" type="submit">Sign in</button>
</form>
{% endblock %}
