name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Tests (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (with dev extras)
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Compile sources
        run: python -c "import compileall, sys; sys.exit(0 if compileall.compile_dir('src', quiet=1) else 1)"
